<!DOCTYPE html>
    <html xmlns:th="https://www.thymeleaf.org/" lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>MyCodeBlog</title>
        <!--css-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
              crossorigin="anonymous">
    </head>
    <body>

   <header>
       <nav class="navbar navbar-expand-lg navbar-light bg-light justify-content-between px-3"> <!-- Espaço nas laterais -->
           <span class="navbar-brand mb-0 h1 fw-bold">MyCodeBlog</span>
               <a href="/newpost" class="btn btn-primary">Novo Post</a>
       </nav>
   </header>

    <section>
        <!--breadcrumb-->
        <div class="container" style="width: 60%; padding-bottom: 30px">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item active" aria-current="page">Posts</li>
                </ol>
            </nav>
            <!--card-->
            <div class="card shadow-sm bg-white rounded" style= "margin-top: 20px" th:each="post: ${posts}">
                <div class="card-body">
                    <p class="card-subtitle mb-2 text-muted" style="font-size: 0.8rem">
                        <span th:text="${post.autor}"></span>
                        <span th:text="${post.data}"></span>
                    </p>
                    <a th:href="@{/posts/{id}(id=${post.id})}">
                        <h4 class="card-title" style="font-weight: bold; color: black; padding-top: 5px">
                            <span th:text="${post.titulo}"></span>
                        </h4>
                    </a>
                    <p class="card-text">
                        <span th:utext="${#strings.abbreviate(post.getTexto(),400)}"></span>
                    </p>
                </div>
            </div>
        </div>
    </section>

    </body>
</html>
