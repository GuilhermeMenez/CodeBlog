<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MyCodeBlog</title>
    <!--css-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.11.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/js/bootstrap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.12/summernote-bs4.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.12/summernote-bs4.js"></script>

</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light justify-content-between px-3">
        <span class="navbar-brand mb-0 h1 fw-bold">MyCodeBlog</span>
        <a href="/posts" class="btn btn-primary">Posts</a>
    </nav>
</header>

<section>
    <!--breadcrumb-->
    <div class="container" style="width: 60%; padding-bottom: 30px">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item" aria-current="page"><a href="posts">Posts</a></li>
                <li class="breadcrumb-item active" aria-current="page">Novo Post</li>
            </ol>
        </nav>


    <div class="mb-2">
        <div th:insert="~{mensagemValidacao :: mensagemValidacao}"></div>
        <form method="post">
            <div class="form-group mb-3">
                <input type="text" class="form-control" name="titulo" placeholder="Título *">
            </div>
            <div class="form-group mb-3">
                <input type="text" class="form-control" name="autor" placeholder="Autor *">
            </div>

            <div>
                <label for="summernote"></label>
                <textarea id="summernote" class="form-control" name="texto" placeholder="Texto *"></textarea>
            </div>

            <small class="form-text text-muted mb-3 d-block">(*) Campos obrigatórios</small>

            <button type="submit" class="btn btn-primary me-2" style="margin-top: 10px;">Publicar</button>
            <a href="/posts" class="btn btn-light" role="button" style="margin-top: 10px;">Cancelar</a>
        </form>
     </div>
    </div>

    <script> $('#summernote').summernote({ placeholder: 'Texto *', tabsize: 2, height: 300 }); </script>
</section>

</body>
</html>
