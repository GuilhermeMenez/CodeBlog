spring.application.name=CodeBlog
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation = true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
api.security.token.secret=${JWT.SECRET:MY-SECRET-KEY}

spring.config.import=optional:application-local.properties
spring.datasource.url=jdbc:postgresql://localhost:5432/codeblog
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}