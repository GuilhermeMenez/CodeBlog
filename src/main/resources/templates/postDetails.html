<!DOCTYPE html>
<html lang="pt-br" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>MyCodeBlog</title>
    <!--css-->
    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          rel="stylesheet">

    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.11.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/js/bootstrap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.12/summernote-bs4.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.12/summernote-bs4.js"></script>

</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light justify-content-between px-3">
        <!-- Espaço nas laterais -->
        <span class="navbar-brand mb-0 h1 fw-bold">MyCodeBlog</span>
        <div>
            <a class="btn btn-primary" href="/newpost">Novo Post</a>
            <button class="btn btn-primary" onclick="handleShowEditPost()">Editar</button>
            <button type="button" class="btn btn-secondary" style="transition: background-color 0.3s"
                    onmouseover="this.style.backgroundColor='#dc3545'" onmouseout="this.style.backgroundColor=''" onclick="handleDeletePost(post.id)">Apagar
            </button>
        </div>
    </nav>
</header>

<main>
    <!--breadcrumb-->
    <div class="container" style="width: 60%; padding-bottom: 30px">

        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li aria-current="page" class="breadcrumb-item">
                    <a href="/posts">
                        Posts
                    </a>
                </li>
                <li aria-current="page" class="breadcrumb-item active">Post</li>
            </ol>
        </nav>
        <article>
            <h1 class="card-title" style="font-weight: bold; margin-bottom: 20px;">
                <span th:text="${post.titulo}"></span>
            </h1>

            <p class="card-subtitle mb-2 text-muted">
                <i class="material-icons">person_outline</i>
                <span th:utext="${post.autor}"></span>
                <br>
                <i class="material-icons">date_range</i>
                <span th:utext="${post.data}"></span>
            </p>
            <section>
                <p class="card-text" style="margin-top: 40px;">
                    <span th:utext="${post.texto}"></span>
                </p>
            </section>
        </article>

        <div class="mb-2">
            <div th:insert="~{mensagemValidacao :: mensagemValidacao}"></div>

            <form id="editForm" method="post" style="display: none;" th:action="@{'/editpost/' + ${post.id}}"
                  th:object="${post}">
                <input name="_method" type="hidden" value="PUT"/>

                <div class="form-group mb-3">
                    <input class="form-control" name="titulo" placeholder="Título *" hidden="hidden"  th:value="${post.titulo}"
                           type="text">
                </div>
                <div class="form-group mb-3">
                    <input class="form-control" name="autor" placeholder="Autor *" th:value="${post.autor}" type="text" hidden="hidden">
                </div>
                <div>
                    <label for="summernote"></label>
                    <textarea class="form-control" id="summernote" name="texto" placeholder="Texto *"
                              th:utext="${post.texto}"></textarea>
                </div>

                <small class="form-text text-muted mb-3 d-block">(*) Campos obrigatórios</small>

                <button class="btn btn-primary me-2" style="margin-top: 10px;" type="submit">Atualizar</button>
                <a class="btn btn-light" role="button" style="margin-top: 10px;" onclick="handleShowEditPost()">Cancelar</a> 
            </form>
        </div>

        <!-- JavaScript -->
        <script>
            function handleShowEditPost() {
                    const form = document.getElementById("editForm");
                    if (form.style.display === "none") {
                        form.style.display = "block";
                    } else {
                        form.style.display = "none"; // Alterna para esconder
                    }
            }


            // Ativando o Summernote
            $('#summernote').summernote({
                placeholder: 'Texto *',
                tabsize: 2,
                height: 300
            });


        </script>

        <script> $('#summernote').summernote({placeholder: 'Texto *', tabsize: 2, height: 300});</script>
    </div>
</main>
</body>
</html>
