# ==========================================
# Configurań§es de ProduńŃo - Koyeb
# ==========================================

spring.application.name=CodeBlog

# ==========================================
# ConfigurańŃo do Servidor
# ==========================================
server.port=${PORT:8080}

# ==========================================
# ConfigurańŃo do PostgreSQL Koyeb
# ==========================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conex§es HikariCP (otimizado para free tier)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# ConfigurańŃo JPA/Hibernate
# ==========================================
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# ConfigurańŃo JWT
# ==========================================
api.security.token.secret=${JWT_SECRET}

# ==========================================
# ConfigurańŃo Redis Cloud
# ==========================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# ==========================================
# ConfigurańŃo Swagger/OpenAPI
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==========================================
# Actuator (Health Checks para Koyeb)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.db.enabled=true
management.health.redis.enabled=true

# ==========================================
# Logging
# ==========================================
logging.level.root=INFO
logging.level.blog.code.codeblog=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

